---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: 17
  install_strategy: once
  deprecations_as_errors: true

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-11
  - name: debian-12
  - name: fedora-latest
  - name: opensuse-leap-15
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: default
    run_list:
      - recipe[mondoo-test::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      mondoo:
        registration_token: <%= ENV['MONDOO_TOKEN'] %>
        api_proxy: <%= ENV['MONDOO_API_PROXY'] %>
