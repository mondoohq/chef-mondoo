---
driver:
  name: dokken
  privileged: true  # because Docker and SystemD
  # Use Cinc Client (open-source Chef Infra Client build) instead of chef/chef.
  # cincproject/cinc publishes 'latest' and major-version tags but no 'current'.
  chef_version: <%= ENV['CHEF_VERSION'] || 'latest' %>

transport:
  name: dokken

provisioner:
  name: dokken
  # Converge with Cinc Client: pulls cincproject/cinc and runs cinc-client.
  # Cinc skips Chef's license-acceptance prompt, so no chef_license is needed.
  product_name: cinc

platforms:
  - name: almalinux-8
    driver:
      image: dokken/almalinux-8
      pid_one_command: /usr/lib/systemd/systemd

  - name: almalinux-9
    driver:
      image: dokken/almalinux-9
      pid_one_command: /usr/lib/systemd/systemd

  - name: amazonlinux-2
    driver:
      image: dokken/amazonlinux-2
      pid_one_command: /usr/lib/systemd/systemd

  - name: amazonlinux-2023
    driver:
      image: dokken/amazonlinux-2023
      pid_one_command: /usr/lib/systemd/systemd

  - name: debian-11
    driver:
      image: dokken/debian-11
      pid_one_command: /bin/systemd

  - name: debian-12
    driver:
      image: dokken/debian-12
      pid_one_command: /bin/systemd

  - name: debian-13
    driver:
      image: dokken/debian-13
      # Debian 13 (trixie) ships systemd at /usr/lib/systemd/systemd, not
      # /bin/systemd like debian-11/12 (matches the dokken-images CMD).
      pid_one_command: /usr/lib/systemd/systemd

  - name: fedora-latest
    driver:
      image: dokken/fedora-latest
      pid_one_command: /usr/lib/systemd/systemd

  - name: ubuntu-20.04
    driver:
      image: dokken/ubuntu-20.04
      pid_one_command: /bin/systemd

  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd

  - name: ubuntu-24.04
    driver:
      image: dokken/ubuntu-24.04
      pid_one_command: /bin/systemd

  - name: opensuse-leap-15
    driver:
      image: dokken/opensuse-leap-15
      pid_one_command: /usr/lib/systemd/systemd

  - name: rockylinux-8
    driver:
      image: dokken/rockylinux-8
      pid_one_command: /usr/lib/systemd/systemd

  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd

verifier:
  name: inspec

suites:
  - name: default
    run_list:
      - recipe[mondoo-test::default]
<% if ENV['MONDOO_TOKEN'] || ENV['MONDOO_API_PROXY'] %>
    attributes:
      mondoo:
<% if ENV['MONDOO_TOKEN'] %>
        registration_token: <%= ENV['MONDOO_TOKEN'] %>
<% end %>
<% if ENV['MONDOO_API_PROXY'] %>
        api_proxy: <%= ENV['MONDOO_API_PROXY'] %>
<% end %>
<% end %>
