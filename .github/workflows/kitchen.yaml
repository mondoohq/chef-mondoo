---
name: Integration Testing

on:
  pull_request:
    types: [opened, reopened, synchronize]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kitchen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  kitchen:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # cnspec login needs the MONDOO_TOKEN secret, which is not exposed to pull
    # requests from forks. Skip (rather than fail) when the PR is from a fork;
    # always run for workflow_dispatch and same-repo PRs.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        # Every platform defined in kitchen.yml. Values are the exact kitchen
        # instance suffixes — Test Kitchen strips dots (ubuntu-24.04 ->
        # ubuntu-2404). They are matched exactly (anchored) in the run step.
        platform:
          - almalinux-8
          - almalinux-9
          - amazonlinux-2
          - amazonlinux-2023
          - debian-11
          - debian-12
          - debian-13
          - fedora-latest
          - ubuntu-2004
          - ubuntu-2204
          - ubuntu-2404
          - opensuse-leap-15
          - rockylinux-8
          - rockylinux-9
    steps:
      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Cinc Workstation
        uses: sous-chefs/install-workstation@c8303c13fb472d166ce0185d62a360b5fe782122 # v0.1.0

      - name: Test Kitchen
        # Anchor the regex (^...$) to the exact instance name so prefixes don't
        # collide — e.g. amazonlinux-2 must not also match amazonlinux-2023.
        # PLATFORM is a fixed allowlist value from the matrix above.
        run: chef exec kitchen test "^default-${PLATFORM}$" --destroy=always
        env:
          PLATFORM: ${{ matrix.platform }}
          CHEF_LICENSE: accept-no-persist
          MONDOO_TOKEN: ${{ secrets.MONDOO_TOKEN }}
